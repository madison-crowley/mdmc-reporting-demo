name: MDMC Demo Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "15 11 * * *"

jobs:
  test-and-optionally-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run demo pipeline when warehouse credentials are present
        if: ${{ env.GCP_PROJECT_ID != '' && env.GCP_SA_KEY != '' }}
        run: python scripts/run_pipeline.py --config configs/demo.yaml
