name: Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: Deployment config to run
        required: false
        default: configs/demo.yaml
        type: string
  schedule:
    - cron: "0 7 * * *"

concurrency:
  group: pipeline-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.config_path || 'configs/demo.yaml' }}
  cancel-in-progress: false

jobs:
  run-deployment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      CONFIG_PATH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.config_path || 'configs/demo.yaml' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run deployment pipeline
        id: run_pipeline
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python scripts/run_pipeline.py --config "$CONFIG_PATH" --step all

      - name: Upload quality report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: artifacts/quality_report.json
          if-no-files-found: error

      - name: Dispatch alerts
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PIPELINE_ALERT_WEBHOOK: ${{ secrets.PIPELINE_ALERT_WEBHOOK }}
        run: python scripts/send_alerts.py --config "$CONFIG_PATH" --quality-report artifacts/quality_report.json --pipeline-status "${{ steps.run_pipeline.outcome }}"
