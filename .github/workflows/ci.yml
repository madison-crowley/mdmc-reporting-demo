name: CI

on:
  pull_request:

jobs:
  test-and-lint-sql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest -q

      - name: Validate BigQuery dry-run secrets
        run: |
          test -n "$GCP_PROJECT_ID"
          test -n "$GCP_SA_KEY"

      - name: Dry-run lint rendered SQL
        run: python scripts/lint_sql.py --config configs/demo.yaml
